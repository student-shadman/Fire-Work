<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔥 Fire Framework Simulator</title>
  <link rel="stylesheet" href="fire.css" />
</head>
<body>
  <canvas id="fireCanvas"></canvas>

  <div class="control-panel">
    <h1>🔥 Fire Simulator</h1>

    <label>Particle Count
      <input type="range" id="particleCount" min="100" max="2000" value="500">
    </label>

    <label>Speed
      <input type="range" id="speed" min="0.5" max="5" step="0.1" value="1">
    </label>

    <label>Spread
      <input type="range" id="spread" min="1" max="10" step="0.1" value="4">
    </label>

    <label>Smoke Intensity
      <input type="range" id="smoke" min="0" max="1" step="0.05" value="0.5">
    </label>

    <div class="toggles">
      <label><input type="checkbox" id="toggleSmoke" checked> Smoke</label>
      <label><input type="checkbox" id="toggleSparks" checked> Sparks</label>
      <label><input type="checkbox" id="toggleHeat" checked> Heat Glow</label>
      <label><input type="checkbox" id="toggleSound" checked> Sound</label>
    </div>

    <div class="presets">
      <button data-preset="campfire">🔥 Campfire</button>
      <button data-preset="candle">🕯️ Candle</button>
      <button data-preset="fireworks">🎆 Fireworks</button>
      <button data-preset="explosion">💥 Explosion</button>
    </div>

    <button id="fullscreenBtn">⛶ Fullscreen</button>
  </div>

  <audio id="fireSound" loop>
    <source src="fire.mp3" type="audio/mpeg" />
  </audio>

  <script src="fire.js"></script>
</body>
</html>
